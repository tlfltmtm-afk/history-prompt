      renderSidebar();
      renderTopNav();
      renderPages();
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar-menu');
      const keys = Object.keys(assessments);
      sidebar.innerHTML = keys.map(grade => `
        <button onclick="selectGrade('${grade}')" class="w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${grade === currentGrade ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-600 hover:bg-gray-100'}">
          ${grade}
        </button>
      `).join('');
    }

    function renderTopNav() {
      const nav = document.getElementById('top-nav');
      const items = assessments[currentGrade];
      nav.innerHTML = items.map((item, idx) => `
        <button onclick="selectTask(${idx})" class="whitespace-nowrap px-4 py-2 flex-shrink-0 rounded-full font-bold text-sm transition-all shadow-sm border ${idx === currentTask ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">
          ${item.title}
        </button>
      `).join('');
    }

    function selectGrade(grade) {
      currentGrade = grade;
      currentTask = 0;
      renderSidebar();
      renderTopNav();
      renderPages();
    }

    function selectTask(idx) {
      currentTask = idx;
      renderTopNav();
      renderPages();
    }

    function renderPages() {
      const viewer = document.getElementById('viewer-container');
      const data = assessments[currentGrade][currentTask];
