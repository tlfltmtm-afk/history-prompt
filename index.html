<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>역사 대화 프롬프트 제너레이터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: 'Pretendard', sans-serif;
    }
    /* Funnel 애니메이션 효과 */
    .step-container {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .step-container.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    
    /* Toast Animation */
    .toast-show {
        opacity: 1 !important;
        transform: translate(-50%, 0) !important;
    }
    
    /* Modal Animation */
    .modal-show {
        display: flex !important;
        opacity: 1 !important;
    }
    .modal-show > div {
        transform: scale(1) !important;
    }

    /* Modal radio selection styling */
    input[type="radio"]:checked + div {
        background-color: #fefce8; /* bg-yellow-50 */
        border-color: #facc15; /* border-yellow-400 */
        color: #854d0e; /* text-yellow-800 */
        font-weight: 700;
    }
  </style>
</head>
<body class="bg-transparent min-h-screen flex items-center justify-center p-0 sm:p-4 text-gray-800">

  <div class="bg-white sm:rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] sm:border border-gray-100 w-full lg:max-w-3xl flex flex-col overflow-hidden h-screen sm:h-auto sm:max-h-[90vh]">
    
    <!-- Header (Crown Yuja) -->
    <div class="bg-gradient-to-b from-yellow-50 to-white px-6 py-8 text-center shrink-0 border-b border-gray-100/50 relative overflow-hidden">
      <!-- Decorative background elements -->
      <div class="absolute top-0 left-0 w-32 h-32 bg-yellow-100 rounded-full blur-3xl opacity-50 -translate-x-1/2 -translate-y-1/2"></div>
      <div class="absolute bottom-0 right-0 w-32 h-32 bg-orange-100 rounded-full blur-3xl opacity-50 translate-x-1/3 translate-y-1/3"></div>
      
      <!-- New Link Button -->
      <a href="assessment.html" class="absolute top-4 right-4 bg-white hover:bg-yellow-50 border border-yellow-200 text-yellow-700 w-11 h-11 rounded-full flex items-center justify-center shadow-sm transition-all hover:scale-105 active:scale-95 group z-20" title="평가지 보기">
        <span class="text-xl group-hover:rotate-12 transition-transform">📄</span>
      </a>

      <div class="text-5xl mb-3 flex justify-center items-center gap-1 drop-shadow-sm transition-transform hover:scale-105 duration-300">
        <span class="text-3xl relative top-[-10px] transform -rotate-12">👑</span>
        <span class="text-[54px] z-10">🍋</span>
        <span class="text-2xl relative top-[-6px] right-[10px] transform rotate-12">🍃</span>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-gray-800 mb-2">안녕! 나는 역사 마스터 유자야!</h1>
      <p class="text-[15px] font-medium text-gray-500">누구와 어떤 역사 이야기를 나누고 싶니? 차근차근 골라봐!</p>
    </div>

    <!-- Funnel Area -->
    <div id="funnel-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-8 scroll-smooth">
      
      <!-- Step 1 -->
      <div id="step-1" class="step-container active">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
            <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">1</span> 
            학년을 선택해 주세요
          </h2>
          <button onclick="skipStep(1)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2.5" id="grid-step-1"></div>
      </div>

      <!-- Step 2 -->
      <div id="step-2" class="step-container">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
            <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">2</span> 
            어떤 역사가 궁금한가요?
          </h2>
          <button onclick="skipStep(2)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
        </div>
        <div class="grid grid-cols-2 gap-2.5" id="grid-step-2"></div>
      </div>

      <!-- Step 3 -->
      <div id="step-3" class="step-container">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
            <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">3</span> 
            구체적으로 무엇을 알아볼까요?
          </h2>
          <button onclick="skipStep(3)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5" id="grid-step-3"></div>
      </div>

      <!-- Step 4 -->
      <div id="step-4" class="step-container relative">
        <div class="pb-4 pt-1 mb-2">
          <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
              <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">4</span> 
              주제를 선택해 주세요
            </h2>
            <button onclick="skipStep(4)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
          </div>
          <div class="flex gap-2">
            <div class="relative flex-1 group">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 transition-colors group-focus-within:text-yellow-500">🔍</span>
              <input type="text" id="search-4" onkeyup="filterList(4)" placeholder="검색어를 입력하세요..." class="w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400 transition-all shadow-sm">
            </div>
            <button onclick="openModal(4)" class="shrink-0 bg-gray-800 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-700 active:scale-95 transition-all flex items-center gap-1.5 shadow-sm">
              ✍️ 직접입력
            </button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2.5" id="grid-step-4"></div>
      </div>

      <!-- Step 5 -->
      <div id="step-5" class="step-container relative">
        <div class="pb-4 pt-1 mb-2">
          <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
              <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">5</span> 
              상세 항목과 역할을 선택해 주세요
            </h2>
            <button onclick="skipStep(5)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
          </div>
          <div class="flex gap-2">
            <div class="relative flex-1 group">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 transition-colors group-focus-within:text-yellow-500">🔍</span>
              <input type="text" id="search-5" onkeyup="filterList(5)" placeholder="검색어를 입력하세요..." class="w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400 transition-all shadow-sm">
            </div>
            <button onclick="openModal(5)" class="shrink-0 bg-gray-800 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-700 active:scale-95 transition-all flex items-center gap-1.5 shadow-sm">
              ✍️ 직접입력
            </button>
          </div>
        </div>
        <div class="grid grid-cols-1 gap-2.5" id="grid-step-5"></div>
      </div>

      <!-- Step 6: Conversation Style -->
      <div id="step-6" class="step-container">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
            <span class="flex items-center justify-center bg-yellow-400 text-yellow-900 w-6 h-6 rounded-full text-sm font-bold shadow-sm">6</span> 
            대화 스타일을 선택해 주세요

          <button onclick="skipStep(6)" class="text-[13px] text-gray-400 hover:text-gray-600 font-medium transition-colors">건너뛰기</button>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2.5" id="grid-step-6"></div>
      </div>

    </div>

    <!-- Footer Action Area -->
    <div class="p-4 sm:p-5 border-t border-gray-100 bg-gray-50/50 flex flex-col gap-3 shrink-0 z-20">
      
      <!-- Selection Summary Block -->
      <div id="selection-summary" class="bg-white rounded-xl p-4 border border-yellow-200 shadow-sm text-sm text-gray-700 hidden transition-all">
        <div class="font-bold text-yellow-800 mb-2 flex items-center gap-1.5"><span class="text-base">📝</span> 현재 선택 요약</div>
        <div id="summary-content" class="leading-relaxed whitespace-pre-line text-gray-600"></div>
      </div>

          <option value="chatgpt">ChatGPT로 열기</option>
          <option value="gemini">Gemini로 열기</option>
        </select>
        <button onclick="generatePrompt()" class="w-full flex-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-950 font-bold py-3.5 px-6 rounded-xl shadow-sm hover:shadow active:scale-[0.98] transition-all text-[16px] flex justify-center items-center gap-2.5">
          <span class="text-xl">🚀</span> AI 대화 시작하기
        </button>
      </div>
    </div>

  <!-- custom modal -->
  <div id="custom-modal" class="fixed inset-0 bg-gray-900/40 z-50 flex items-center justify-center backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-sm transform scale-95 transition-transform duration-300">
      <h3 id="modal-title" class="text-lg font-bold mb-4 text-gray-800 flex items-center gap-2">
        <span>✍️</span> 직접 입력해주세요
      </h3>
      <input type="text" id="modal-input" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400 focus:outline-none mb-4 text-[15px] shadow-sm transition-all" placeholder="내용을 입력하세요..." />
      
      <div id="modal-role-options" class="flex gap-2 mb-5 hidden">
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="modal_role" value="self" checked class="hidden" onchange="updateModalRadioStyles()">
          <div class="border border-gray-200 rounded-xl p-3 text-center text-[13px] text-gray-600 transition-colors bg-yellow-50 border-yellow-400 text-yellow-800 font-bold modal-radio-div">본인 빙의</div>
        </label>
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="modal_role" value="witness" class="hidden" onchange="updateModalRadioStyles()">
          <div class="border border-gray-200 rounded-xl p-3 text-center text-[13px] text-gray-600 transition-colors bg-white modal-radio-div">지인(목격자)</div>
        </label>
      </div>

      <div class="flex justify-end gap-2.5">
        <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-[15px] font-medium text-gray-500 hover:bg-gray-100 active:scale-95 transition-all">취소</button>

      </div>
    </div>
  </div>

          "현대": ["알베르트 아인슈타인", "윈스턴 처칠", "프랭클린 D. 루스벨트", "아돌프 히틀러", "이오시프 스탈린", "마하트마 간디", "넬슨 만델라", "마틴 루터 킹 주니어", "안네 프랑크", "체 게바라", "존 F. 케네디", "마오쩌둥", "호찌민", "미하일 고르바초프", "엘리자베스 2세"]

        "사건": [

        ]
      }
    };

    // --- State 관리 ---
    const state = {
      grade: null,
      subject: null,
      category: null,
      detail1: null,
      detail2: null,
      role: null,
      convStyle: null
    };

    const config = {
      grades: ["초1~2", "초3~4", "초5~6", "중등", "고등", "성인"],
      subjects: ["한국사", "세계사"],
      categories: ["시대", "국가", "인물", "사건"],
      convStyles: ["이야기꾼", "뉴스기자", "백과사전", "선생님", "개그맨"]
    };

    // 버튼 렌더링
    window.onload = () => {
      renderButtons('grid-step-1', config.grades, (val) => selectStep(1, 'grade', val));
      renderButtons('grid-step-2', config.subjects, (val) => selectStep(2, 'subject', val));
      renderButtons('grid-step-3', config.categories, (val) => selectStep(3, 'category', val));
      renderButtons('grid-step-6', config.convStyles, (val) => selectStep(6, 'convStyle', val));
      
      // Step 6 직접 입력 버튼 추가
      const step6Grid = document.getElementById('grid-step-6');
      const manualBtn = document.createElement('button');
      manualBtn.className = "item-btn bg-gray-800 text-white rounded-xl p-3.5 text-[14px] sm:text-[15px] font-bold hover:bg-gray-700 active:scale-95 shadow-sm";
      manualBtn.innerHTML = "✍️ 직접입력";
      manualBtn.onclick = () => openModal(6);
      step6Grid.appendChild(manualBtn);
    };

    function renderButtons(containerId, items, onClickFunc) {
      const container = document.getElementById(containerId);
      container.innerHTML = items.map(item => `
        <button class="item-btn bg-white border border-gray-200 rounded-xl p-3.5 text-[14px] sm:text-[15px] font-medium text-gray-700 hover:bg-yellow-50 hover:border-yellow-400 hover:text-yellow-800 transition-all active:scale-95 focus:ring-2 focus:ring-yellow-400/50 focus:outline-none shadow-sm"
                onclick="(${onClickFunc})('${item}')">
          ${item}
        </button>
      `).join('');
    }

    // 단계 선택 로직
    function selectStep(stepNum, key, value, roleVal = null) {
      state[key] = value;
      if(roleVal) state.role = roleVal;
      
      if(key !== 'detail2' || !roleVal) {
          highlightSelection(`grid-step-${stepNum}`, value);
      } else {
          highlightCardSelection(`grid-step-${stepNum}`, value, roleVal);
      }
      
      // 하위 스텝 꼬임 방지
      if (stepNum === 2) { state.category = state.detail1 = state.detail2 = state.role = state.convStyle = null; hideStepsFrom(3); }
      if (stepNum === 3) { state.detail1 = state.detail2 = state.role = state.convStyle = null; hideStepsFrom(4); }
      if (stepNum === 4) { state.detail2 = state.role = state.convStyle = null; hideStepsFrom(5); }
      if (stepNum === 5) { state.convStyle = null; hideStepsFrom(6); }

      showNextStep(stepNum);
      updateSummary();
    }

    function skipStep(stepNum) {
      const keys = ['grade', 'subject', 'category', 'detail1', 'detail2', 'convStyle'];
      state[keys[stepNum-1]] = '미정';
      clearSelection(`grid-step-${stepNum}`);
      if(stepNum === 5) state.role = '미정';
      
      if (stepNum === 2 || stepNum === 3) {
          state.detail1 = state.detail2 = state.role = state.convStyle = '미정';
          hideStepsFrom(stepNum + 1);
          updateSummary();
          return;
      }
      if (stepNum === 4) {
          state.detail2 = state.role = state.convStyle = '미정';
          hideStepsFrom(5);
      }
      if (stepNum === 5) {
          state.convStyle = '미정';
          hideStepsFrom(6);
      }
      showNextStep(stepNum);
      updateSummary();
    }

    function showNextStep(currentStep) {
      const nextStep = currentStep + 1;
      
      if (currentStep === 3) {
        if(!state.subject || !state.category || state.subject === '미정' || state.category === '미정') return;
        renderStep4();
      }

      if (currentStep === 4) {
        if (state.category === '인물' && state.detail1 !== '미정') {
          renderStep5();
          document.getElementById('step-5').classList.add('active');
        } else if (state.category !== '인물' && state.detail1 !== '미정') {
          // 인물이 아니면 5단계를 스킵하고 바로 6단계(스타일)로 이동
          document.getElementById('step-6').classList.add('active');
          setTimeout(() => {
            document.getElementById('funnel-container').scrollTo({
              top: document.getElementById('step-6').offsetTop - 20,
              behavior: 'smooth'
            });
          }, 150);
          return; // 5단계를 건너뛰었으므로 아래 로직 중단
        }
      }

      const nextEl = document.getElementById(`step-${nextStep}`);
      if (nextEl) {
        nextEl.classList.add('active');
        setTimeout(() => {
          document.getElementById('funnel-container').scrollTo({
            top: nextEl.offsetTop - 20,
            behavior: 'smooth'
          });
        }, 150);
      }
    }

    function hideStepsFrom(stepNum) {
      for (let i = stepNum; i <= 6; i++) {
        const el = document.getElementById(`step-${i}`);
        if (el) {
          el.classList.remove('active');
          if(i === 4 || i === 5) {
             const searchEl = document.getElementById(`search-${i}`);
             if(searchEl) searchEl.value = ''; 
          }
        }
      }
    }

    function highlightSelection(containerId, value) {
      const container = document.getElementById(containerId);
      if(!container) return;
      const btns = container.querySelectorAll('.item-btn');
      btns.forEach(btn => {
        if (btn.innerText === value) {
          btn.classList.add('bg-yellow-50', 'border-yellow-400', 'text-yellow-800', 'ring-2', 'ring-yellow-400/20');
        } else {
          btn.classList.remove('bg-yellow-50', 'border-yellow-400', 'text-yellow-800', 'ring-2', 'ring-yellow-400/20');
        }
      });
    }

    function clearSelection(containerId) {
      const container = document.getElementById(containerId);
      if(!container) return;
      const btns = container.querySelectorAll('.item-btn, .item-card');
      btns.forEach(btn => {
        if(btn.classList.contains('item-btn')){
           btn.classList.remove('bg-yellow-50', 'border-yellow-400', 'text-yellow-800', 'ring-2', 'ring-yellow-400/20');
        } else {
           btn.classList.remove('border-yellow-400', 'ring-2', 'ring-yellow-400/20', 'bg-yellow-50/30');
           const sb = btn.querySelector('.self-btn');
           const wb = btn.querySelector('.witness-btn');
           if(sb) { sb.classList.remove('bg-yellow-400', 'text-yellow-900'); sb.classList.add('bg-gray-100', 'text-gray-600'); }
           if(wb) { wb.classList.remove('bg-yellow-400', 'text-yellow-900'); wb.classList.add('bg-gray-100', 'text-gray-600'); }
        }
      });
    }

    function highlightCardSelection(containerId, value, roleVal) {
      const container = document.getElementById(containerId);
      if(!container) return;
      const cards = container.querySelectorAll('.item-card');
      cards.forEach(card => {
        const name = card.getAttribute('data-val');
        const selfBtn = card.querySelector('.self-btn');
        const witnessBtn = card.querySelector('.witness-btn');
        
        card.classList.remove('border-yellow-400', 'ring-2', 'ring-yellow-400/20', 'bg-yellow-50/30');
        selfBtn.classList.remove('bg-yellow-400', 'text-yellow-900');
        selfBtn.classList.add('bg-gray-100', 'text-gray-600');
        witnessBtn.classList.remove('bg-yellow-400', 'text-yellow-900');
        witnessBtn.classList.add('bg-gray-100', 'text-gray-600');

        if (name === value) {
          card.classList.add('border-yellow-400', 'ring-2', 'ring-yellow-400/20', 'bg-yellow-50/30');
          if (roleVal === 'self') {
             selfBtn.classList.remove('bg-gray-100', 'text-gray-600');
             selfBtn.classList.add('bg-yellow-400', 'text-yellow-900');
          } else if (roleVal === 'witness') {
             witnessBtn.classList.remove('bg-gray-100', 'text-gray-600');
             witnessBtn.classList.add('bg-yellow-400', 'text-yellow-900');
          }
        }
      });
    }

    // 동적 리스트
    function renderStep4() {
      const data = historyData[state.subject][state.category];
      let items = Array.isArray(data) ? data : Object.keys(data);
      renderButtons('grid-step-4', items, (val) => selectStep(4, 'detail1', val));
    }

    function renderStep5() {
      const container = document.getElementById('grid-step-5');
      if(state.category === '인물') {
          const data = historyData[state.subject]['인물'][state.detail1];
          if(!data) return;
          container.innerHTML = data.map(item => `
            <div class="item-card bg-white border border-gray-200 rounded-xl p-2 sm:p-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 shadow-sm transition-all" data-val="${item}">
               <div class="font-bold text-gray-800 text-[14px] sm:text-[15px] pl-1 break-keep item-name">${item}</div>
               <div class="flex gap-1.5 w-full sm:w-auto shrink-0">
                  <button onclick="selectStep(5, 'detail2', '${item}', 'self')" class="role-btn self-btn flex-1 sm:flex-none px-3 py-2 bg-gray-100 text-gray-600 rounded-lg text-[13px] font-bold hover:bg-yellow-50 hover:text-yellow-700 active:scale-95 transition-all">${item} 본인</button>
                  <button onclick="selectStep(5, 'detail2', '${item}', 'witness')" class="role-btn witness-btn flex-1 sm:flex-none px-3 py-2 bg-gray-100 text-gray-600 rounded-lg text-[13px] font-bold hover:bg-yellow-50 hover:text-yellow-700 active:scale-95 transition-all">지인</button>
               </div>
            </div>
          `).join('');
      } else {
          const data = historyData[state.subject][state.category];
          // 주제가 배열인 경우(시대, 국가, 사건) detail1 선택 후 추가 상세가 없을 수 있음
          if(Array.isArray(data)) {
              // 이미 4단계에서 선택했으므로 5단계는 '추가 상세 없음' 등으로 처리하거나 건너뜀
              container.innerHTML = '<div class="col-span-full p-4 text-center text-gray-400 text-sm">상세 항목이 없습니다. 바로 다음 단계를 확인하세요.</div>';
          } else {
             // 인물의 경우 이미 위에서 처리함
          }
      }
    }

    function filterList(stepNum) {
      const searchStr = document.getElementById(`search-${stepNum}`).value.trim().toLowerCase();
      const container = document.getElementById(`grid-step-${stepNum}`);
      const items = container.querySelectorAll('.item-btn, .item-card');
      items.forEach(btn => {
        const textEl = btn.classList.contains('item-card') ? btn.querySelector('.item-name') : btn;
        const btnText = textEl.innerText.replace(/\s+/g, "").toLowerCase();
        const searchQuery = searchStr.replace(/\s+/g, "");
        if (btnText.includes(searchQuery)) {
          btn.style.display = btn.classList.contains('item-card') ? 'flex' : 'block';
        } else {
          btn.style.display = 'none';
        }
      });
    }

    // Modal 관리
    let currentModalStep = null;
    function openModal(stepNum) {
      currentModalStep = stepNum;
      const modal = document.getElementById('custom-modal');
      const input = document.getElementById('modal-input');
      const roleOptions = document.getElementById('modal-role-options');
      input.value = '';
      
      if (stepNum === 5 && state.category === '인물') {
          roleOptions.classList.remove('hidden');
          document.querySelector('input[name="modal_role"][value="self"]').checked = true;
          updateModalRadioStyles();
      } else {
          roleOptions.classList.add('hidden');
      }

      modal.classList.remove('opacity-0', 'pointer-events-none');
      modal.classList.add('modal-show');
      setTimeout(() => input.focus(), 100);
    }

    function closeModal() {
      const modal = document.getElementById('custom-modal');
      modal.classList.remove('modal-show');
      modal.classList.add('opacity-0', 'pointer-events-none');
      currentModalStep = null;
    }

    function updateModalRadioStyles() {
      const radios = document.querySelectorAll('input[name="modal_role"]');
      radios.forEach(radio => {
        const div = radio.nextElementSibling;
        if (radio.checked) {
          div.className = "border border-yellow-400 rounded-xl p-3 text-center text-[13px] transition-colors bg-yellow-50 text-yellow-800 font-bold modal-radio-div";
        } else {
          div.className = "border border-gray-200 rounded-xl p-3 text-center text-[13px] text-gray-600 transition-colors bg-white modal-radio-div";
        }
      });
    }

    function confirmModal() {
      const input = document.getElementById('modal-input').value.trim();
      if (input !== "") {
        const key = currentModalStep === 4 ? 'detail1' : (currentModalStep === 5 ? 'detail2' : 'convStyle');
        let roleVal = null;
        if(currentModalStep === 5 && state.category === '인물') {
            roleVal = document.querySelector('input[name="modal_role"]:checked').value;
        }
        selectStep(currentModalStep, key, input, roleVal);
        closeModal();
      }
    }
    
    document.getElementById('modal-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmModal(); });

    // Summary Update
    function updateSummary() {
      const summaryBox = document.getElementById('selection-summary');
      const content = document.getElementById('summary-content');
      const arr = [];
      if(state.grade) arr.push(`학년: <span class="text-gray-900 font-medium">${state.grade}</span>`);
      if(state.subject) arr.push(`과목: <span class="text-gray-900 font-medium">${state.subject}</span>`);
      if(state.category) arr.push(`분류: <span class="text-gray-900 font-medium">${state.category}</span>`);
      if(state.detail1) arr.push(`주제: <span class="text-gray-900 font-medium">${state.detail1}</span>`);
      if(state.detail2 && state.detail2 !== '미정') arr.push(`상세: <span class="text-gray-900 font-medium">${state.detail2}</span>`);
      if(state.role && state.role !== '미정') {
          const roleTxt = state.role === 'self' ? '본인' : '지인(목격자)';
          arr.push(`역할: <span class="text-yellow-700 font-bold">${roleTxt}</span>`);
      }
      if(state.convStyle) arr.push(`스타일: <span class="text-blue-600 font-bold">${state.convStyle}</span>`);

      if(arr.length > 0) {
        content.innerHTML = arr.join(' &nbsp;/&nbsp; ');
        summaryBox.classList.remove('hidden');
      } else {
        summaryBox.classList.add('hidden');
      }
    }

    // Toast UI
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').innerText = message;
      toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-[20px]');
      toast.classList.add('toast-show');
      setTimeout(() => {
        toast.classList.remove('toast-show');
        toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-[20px]');
      }, 3000);
    }

    function generatePrompt() {
      const g = state.grade || '미정';
      const s = state.subject || '미정';
      const c = state.category || '미정';
      const st = state.convStyle || '미정';
      
      let detail = '미정';
      if (c === '인물') {
        detail = (state.detail2 && state.detail2 !== '미정') ? state.detail2 : (state.detail1 || '미정');
      } else {
        detail = (state.detail2 && state.detail2 !== '미정') ? state.detail2 : (state.detail1 || '미정');
      }

      const hasUndecided = [g, s, c, detail].includes('미정');

      let promptText = `너는 **${g}** 수준의 눈높이에 맞춰 설명해 주는 친절하고 유머러스한 역사 선생님이야.\n`;
      promptText += `현재 나의 선택: **[과목: ${s}], [분류: ${c}], [주제: ${detail}], [대화스타일: ${st}]**\n\n`;
      promptText += `### 📜 [핵동 지침 - 필수 실드]\n`;
      promptText += `1. **절대 금기 사항**: 너는 철저히 역사적 사실에만 근거하여 답변해야 해. 역사를 배우는 교구이므로 **허구의 픽션이나 상상을 가미해서는 절대 안 돼.**\n`;
      promptText += `2. **대화 스타일**: 사용자 선택에 따라 **'${st}'**의 말투와 문체를 유지하며 답변해 줘.\n`;

      if (hasUndecided) {
        promptText += `3. 내가 선택한 항목 중 일부가 아직 '미정'이므로:\n`;
        promptText += `   - 역사 인물로 바로 빙의하지 말고, 선택된 범위 내에서 재미있는 예시를 3~4개 들어줘.\n`;
        promptText += `   - 앞으로 무엇을 알아보고 싶은지 객관식으로 재미있게 질문해 줘.\n`;
      } else {
        promptText += `3. 내가 알아보고 싶은 내용이 구체적으로 정해졌으므로:\n`;
        if (state.category === '인물' && state.role === 'self') {
            promptText += `   - **즉시 해당 인물 본인(${detail})으로 1인칭 빙의해서**, 생생하고 몰입감 있게 첫인사를 건네며 대화를 시작해.\n`;
        } else if (state.category === '인물' && state.role === 'witness') {
            promptText += `   - **즉시 해당 인물(${detail})과 가까운 동시대의 지인/목격자로 1인칭 빙의해서**, 생생하고 몰입감 있게 첫인사를 건네며 대화를 시작해.\n`;
        } else {
            promptText += `   - **즉시 해당 시대의 인물이나 사건의 핵심 목격자로 1인칭 빙의해서**, 생생하고 몰입감 있게 첫인사를 건네며 대화를 시작해.\n`;
        }
      }

      promptText += `4. 매 답변의 끝에는 항상 다음과 같이 질문해 줘.\n`;
      promptText += `   - *"질문 앞 번호만 입력해도 돼요!"* (사용자에게 친절하게 안내)\n`;
      promptText += `   - *"다음으로 궁금한 건 뭐니?"*\n`;
      promptText += `   - 대화를 자연스럽게 이어갈 수 있는 **[예시 질문 3가지]를 번호(1, 2, 3)를 붙여서** 제시해 줘. (사용자가 숫자만 입력해도 대화가 진행되도록 설계해.)\n`;

      navigator.clipboard.writeText(promptText).then(() => {
        showToast("✨ 프롬프트가 복사되었습니다! 새 창에 붙여넣기 해주세요.");
        setTimeout(() => {
            const aiSelector = document.getElementById('ai-selector').value;
            const url = aiSelector === 'chatgpt' ? 'https://chat.openai.com/' : 'https://gemini.google.com/';
            window.open(url, '_blank');
        }, 1200);
      }).catch(err => {
        showToast("클립보드 복사에 실패했습니다. 권한을 확인해 주세요.");
      });
    }
  </script>
</body>
</html>
